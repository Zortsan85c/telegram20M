name: Upload Large File via MTProto

on:
  repository_dispatch:
    types: [upload_large_file]

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyrogram tgcrypto aiohttp

      - name: Download and Upload File
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          FILE_URL: ${{ github.event.client_payload.file_url }}
          FILE_NAME: ${{ github.event.client_payload.file_name }}
          CHAT_ID: ${{ github.event.client_payload.chat_id }}
          CAPTION: ${{ github.event.client_payload.caption }}
        run: python uploader.py
